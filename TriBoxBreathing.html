<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Guided Breathing</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0f1a">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Breathe">
    <link rel="apple-touch-icon" href="icon-180.png">

    <!-- Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0a0f1a;
            --bg-mid: #111827;
            --container-bg: rgba(255, 255, 255, 0.035);
            --container-border: rgba(255, 255, 255, 0.06);
            --fg-color: #e8e6e3;
            --fg-muted: #7a776f;
            --primary-color: #7eb8a8;
            --secondary-color: #c4a882;
            --accent-color: #a8c5b8;
            --inhale-color: #7eb8a8;
            --exhale-color: #b8937a;
            --hold-color: #8b9dc3;
            --inactive-color: #2a2f3a;
            --glow-sage: rgba(126, 184, 168, 0.35);
            --glow-terracotta: rgba(184, 147, 122, 0.35);
            --glow-blue: rgba(139, 157, 195, 0.35);
            --font-display: 'Cormorant Garamond', 'Georgia', serif;
            --font-ui: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius-sm: 12px;
            --radius-lg: 20px;
            --radius-pill: 999px;
            --transition-smooth: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
        }

        body {
            font-family: var(--font-ui);
            min-height: 100dvh;
            background: radial-gradient(ellipse at 50% 30%, var(--bg-mid) 0%, var(--bg-color) 70%);
            color: var(--fg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: env(safe-area-inset-top, 0.75rem) env(safe-area-inset-right, 0.75rem) env(safe-area-inset-bottom, 0.75rem) env(safe-area-inset-left, 0.75rem);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-y: auto;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
            pointer-events: none;
            z-index: 9999;
        }

        /* --- App Container --- */
        .app-container {
            width: 100%;
            max-width: 420px;
            min-height: 100dvh;
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--container-border);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        /* On larger screens, show as a card */
        @media (min-width: 480px) {
            .app-container {
                min-height: auto;
                height: 95vh;
                max-height: 780px;
                border-radius: var(--radius-lg);
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 80px rgba(126, 184, 168, 0.05);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- Mode Switcher --- */
        .mode-switcher {
            display: flex;
            justify-content: center;
            margin-bottom: 1.25rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius-pill);
            padding: 4px;
            position: relative;
        }

        .mode-btn {
            flex: 1;
            padding: 0.65rem 1rem;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 1px;
            background: transparent;
            color: var(--fg-muted);
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: color var(--transition-smooth), background var(--transition-smooth);
            min-height: 44px;
            position: relative;
            z-index: 1;
        }

        .mode-btn:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        .mode-btn.active {
            background: rgba(126, 184, 168, 0.1);
            color: var(--primary-color);
            font-weight: 400;
        }

        /* --- Breathing Display --- */
        .breathing-display {
            flex: 1;
            display: grid;
            place-items: center;
            position: relative;
            min-height: 280px;
        }

        .shape-container {
            position: relative;
            width: 240px;
            height: 240px;
        }

        .shape-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
            overflow: visible;
        }

        #triangle-svg {
            transform: rotate(-150deg);
        }

        .shape-track {
            stroke: var(--inactive-color);
            stroke-width: 4;
            fill: none;
            opacity: 0.5;
        }

        .shape-progress {
            stroke: var(--primary-color);
            stroke-width: 6;
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.15s linear, stroke 0.6s ease;
            filter: url(#glow);
        }

        .display-text {
            position: absolute;
            text-align: center;
            user-select: none;
            pointer-events: none;
        }

        #phase-label {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 3px;
            color: var(--primary-color);
            text-transform: uppercase;
            transition: color 0.6s ease;
        }

        #countdown-timer {
            font-family: var(--font-display);
            font-size: 5.5rem;
            font-weight: 300;
            line-height: 1;
            margin-top: 0.5rem;
            color: var(--fg-color);
            transition: text-shadow 0.6s ease;
        }

        .hidden { display: none !important; }

        /* Breathing pulse animation on the shape container */
        @keyframes breathePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .shape-container.active {
            animation: breathePulse 4s ease-in-out infinite;
        }

        /* --- Controls --- */
        .controls-section {
            padding-top: 0.5rem;
        }

        .controls, .toggles {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .controls {
            margin-bottom: 1.25rem;
        }

        .toggles {
            margin-bottom: 0.75rem;
            gap: 0.5rem;
        }

        .btn, .toggle-btn {
            font-family: var(--font-ui);
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.4px;
            padding: 0.75rem 1.75rem;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            min-height: 48px;
            min-width: 90px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all var(--transition-smooth);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active, .toggle-btn:active {
            transform: scale(0.96);
        }

        .btn:focus-visible, .toggle-btn:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        #action-btn {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 2.5px;
            text-transform: lowercase;
            padding: 0.8rem 3rem;
            min-width: 140px;
        }

        .action-start {
            background: rgba(126, 184, 168, 0.12);
            color: var(--primary-color);
            border-color: rgba(126, 184, 168, 0.25);
        }

        .action-start:hover {
            background: rgba(126, 184, 168, 0.22);
            box-shadow: 0 0 30px rgba(126, 184, 168, 0.1);
        }

        .action-pause {
            background: rgba(196, 168, 130, 0.12);
            color: var(--secondary-color);
            border-color: rgba(196, 168, 130, 0.25);
        }

        .action-pause:hover {
            background: rgba(196, 168, 130, 0.22);
            box-shadow: 0 0 30px rgba(196, 168, 130, 0.1);
        }

        .toggle-btn {
            background: rgba(255, 255, 255, 0.03);
            color: var(--fg-muted);
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-style: italic;
            font-weight: 300;
            letter-spacing: 1.2px;
            padding: 0.55rem 1.1rem;
            min-width: 0;
            border-color: rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .toggle-btn::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: transparent;
            transition: background 0.5s ease, box-shadow 0.5s ease;
        }

        .toggle-btn[aria-pressed="true"] {
            background: rgba(126, 184, 168, 0.08);
            color: var(--primary-color);
            border-color: rgba(126, 184, 168, 0.2);
        }

        .toggle-btn[aria-pressed="true"]::after {
            background: var(--primary-color);
            box-shadow: 0 0 6px var(--glow-sage);
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .toggle-btn[aria-pressed="true"]:hover {
            background: rgba(126, 184, 168, 0.14);
            box-shadow: 0 0 16px rgba(126, 184, 168, 0.08);
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            color: var(--fg-muted);
            font-size: 0.8rem;
            padding-top: 0.75rem;
        }

        /* --- Duration Selector --- */
        .duration-selector {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .duration-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 0.95rem;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 0.5px;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: var(--fg-muted);
            cursor: pointer;
            min-height: 44px;
            min-width: 52px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all var(--transition-smooth);
            -webkit-tap-highlight-color: transparent;
        }

        .duration-btn:active {
            transform: scale(0.96);
        }

        .duration-btn:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        .duration-btn.selected {
            background: rgba(126, 184, 168, 0.1);
            color: var(--primary-color);
            border-color: rgba(126, 184, 168, 0.2);
        }

        .duration-btn:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .duration-value {
            font-weight: 400;
            line-height: 1.2;
        }

        /* --- Session Time --- */
        .session-time {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--fg-muted);
            opacity: 0.7;
        }

        /* --- Session Complete Flash --- */
        .session-flash {
            text-align: center;
            animation: flashFadeIn 0.6s ease-out;
        }

        .session-flash .flash-text {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 3px;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        @keyframes flashFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flashFadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* --- Accessibility --- */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            .shape-progress {
                transition: none;
            }
            .app-container {
                animation: none;
            }
            .shape-container.active {
                animation: none;
            }
        }
    </style>
</head>
<body>

    <main class="app-container">
        <header class="mode-switcher">
            <button id="box-mode-btn" class="mode-btn active" data-mode="box">4 x 4 Box</button>
            <button id="triangle-mode-btn" class="mode-btn" data-mode="triangle">4-7-8 Triangle</button>
        </header>

        <section class="breathing-display">
            <div id="shape-container" class="shape-container">
                <!-- Shared SVG filter for glow effect -->
                <svg style="position:absolute;width:0;height:0">
                    <defs>
                        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                            <feMerge>
                                <feMergeNode in="blur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                    </defs>
                </svg>

                <svg id="box-svg" class="shape-svg" viewBox="0 0 100 100">
                    <path class="shape-track" d="M 5,5 L 95,5 L 95,95 L 5,95 Z" />
                    <path id="box-progress" class="shape-progress" d="M 5,5 L 95,5 L 95,95 L 5,95 Z" />
                </svg>
                <svg id="triangle-svg" class="shape-svg hidden" viewBox="0 0 100 100">
                    <path class="shape-track" d="M 50,5 L 95,82 L 5,82 Z" />
                    <path id="triangle-progress" class="shape-progress" d="M 50,5 L 95,82 L 5,82 Z" />
                </svg>
            </div>
            <div class="display-text">
                <div id="phase-label">Ready</div>
                <div id="countdown-timer"></div>
            </div>
        </section>

        <div class="duration-selector" id="duration-selector">
            <button class="duration-btn" data-minutes="1">
                <span class="duration-value">1m</span>
            </button>
            <button class="duration-btn" data-minutes="2">
                <span class="duration-value">2m</span>
            </button>
            <button class="duration-btn" data-minutes="3">
                <span class="duration-value">3m</span>
            </button>
            <button class="duration-btn selected" data-minutes="5">
                <span class="duration-value">5m</span>
            </button>
        </div>

        <section class="controls-section">
            <div id="main-controls" class="controls">
                <button id="action-btn" class="btn action-start">Start</button>
            </div>
            <div class="toggles">
                <button id="voice-toggle" class="toggle-btn" aria-pressed="true" title="Toggle Voice Cues">voice</button>
                <button id="breath-toggle" class="toggle-btn" aria-pressed="true" title="Toggle Breath Sound">breath</button>
                <button id="ambient-toggle" class="toggle-btn" aria-pressed="false" title="Toggle Ambient Sound">ambient</button>
            </div>
        </section>

        <footer>
            <div id="session-time" class="session-time">
                <span id="remaining-time"></span>
            </div>
        </footer>
    </main>

    <div id="announcer" class="sr-only" aria-live="assertive" aria-atomic="true"></div>

    <script type="module">
        // --- DATA LAYER ---
        const PHASES = {
            box: [
                { name: 'Inhale', duration: 4 },
                { name: 'Hold', duration: 4 },
                { name: 'Exhale', duration: 4 },
                { name: 'Hold', duration: 4 }
            ],
            triangle: [
                { name: 'Inhale', duration: 4 },
                { name: 'Hold', duration: 7 },
                { name: 'Exhale', duration: 8 }
            ]
        };

        // Phase-to-color mapping for dynamic stroke + label color
        const PHASE_COLORS = {
            'Inhale': { color: 'var(--inhale-color)', glow: 'var(--glow-sage)' },
            'Exhale': { color: 'var(--exhale-color)', glow: 'var(--glow-terracotta)' },
            'Hold':   { color: 'var(--hold-color)',   glow: 'var(--glow-blue)' }
        };

        const PREF_KEY = 'breathingAppPrefs';
        // --- STATE ---
        let state = {
            mode: 'box',
            running: false,
            paused: false,
            phaseIndex: 0,
            phaseStartTime: 0,
            accumulatedPauseTime: 0,
            animationFrameId: null,
            lastFrameTime: null,
            cycleCount: 0,
            sessionDuration: 5 * 60,
            sessionRemaining: 0,
            sessionComplete: false,
            flashActive: false,
            preferences: {
                voice: true,
                breath: true,
                ambient: null
            }
        };

        // --- UI ELEMENTS ---
        const UI = {
            phaseLabel: document.getElementById('phase-label'),
            countdownTimer: document.getElementById('countdown-timer'),
            actionBtn: document.getElementById('action-btn'),
            voiceToggle: document.getElementById('voice-toggle'),
            breathToggle: document.getElementById('breath-toggle'),
            ambientToggle: document.getElementById('ambient-toggle'),
            announcer: document.getElementById('announcer'),
            remainingTime: document.getElementById('remaining-time'),
            durationSelector: document.getElementById('duration-selector'),
            sessionTimeDisplay: document.getElementById('session-time'),
            boxSVG: document.getElementById('box-svg'),
            triangleSVG: document.getElementById('triangle-svg'),
            boxProgress: document.getElementById('box-progress'),
            triangleProgress: document.getElementById('triangle-progress'),
            shapeContainer: document.getElementById('shape-container'),
            modeBtns: document.querySelectorAll('.mode-btn')
        };

        // --- AUDIO ---
        let audioContext;
        let breathNodes = {};
        let ambientNodes = {};
        const isSpeechSupported = 'speechSynthesis' in window;
        let isReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        window.matchMedia('(prefers-reduced-motion: reduce)')
            .addEventListener('change', e => { isReducedMotion = e.matches; });
        let speechInitialized = false;
        let voices = [];

        // --- SVG PATH LENGTHS ---
        const pathLengths = {
            box: UI.boxProgress.getTotalLength(),
            triangle: UI.triangleProgress.getTotalLength()
        };

        // =================================================================
        // CORE LOGIC
        // =================================================================

        function init() {
            primeSpeechSynthesis();

            // Event Listeners
            UI.actionBtn.addEventListener('click', () => {
                if (state.running && !state.paused) pauseBreathing();
                else startBreathing();
            });

            UI.modeBtns.forEach(btn => {
                btn.addEventListener('click', () => setMode(btn.dataset.mode));
            });

            UI.voiceToggle.addEventListener('click', () => togglePreference('voice'));
            UI.breathToggle.addEventListener('click', () => togglePreference('breath'));

            // Duration selector
            document.querySelectorAll('.duration-btn').forEach(btn => {
                btn.addEventListener('click', () => selectDuration(parseInt(btn.dataset.minutes)));
            });

            // Ambient toggle — simple on/off for fireplace
            UI.ambientToggle.addEventListener('click', () => {
                ensureAudioContext();
                if (ambientActive) {
                    toggleAmbient('fireplace', false);
                    ambientActive = false;
                } else {
                    toggleAmbient('fireplace', true);
                    ambientActive = true;
                }
                updateToggleState(UI.ambientToggle, ambientActive);
                state.preferences.ambient = ambientActive ? 'fireplace' : null;
                savePreferences();
            });

            // Keyboard Shortcuts
            window.addEventListener('keydown', e => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (state.flashActive) return;
                    if (state.running && !state.paused) pauseBreathing();
                    else startBreathing();
                }
            });

            loadPreferences();
            updateUIForState();
            resetUI();

            if (!isSpeechSupported) {
                UI.voiceToggle.disabled = true;
                UI.voiceToggle.title = "Speech Synthesis not supported by your browser.";
                state.preferences.voice = false;
                updateToggleState(UI.voiceToggle, false);
            }

            // Register service worker for PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            }
        }

        function mainLoop(timestamp) {
            if (!state.running || state.paused) return;

            const currentPhase = PHASES[state.mode][state.phaseIndex];
            const elapsedSincePhaseStart = (timestamp - state.phaseStartTime) / 1000;

            if (elapsedSincePhaseStart >= currentPhase.duration) {
                advancePhase();
            } else {
                updateUI(elapsedSincePhaseStart);
            }

            // Countdown logic
            const lastTime = state.lastFrameTime;
            const delta = (timestamp - lastTime) / 1000;
            state.lastFrameTime = timestamp;
            state.sessionRemaining = Math.max(0, state.sessionRemaining - delta);
            UI.remainingTime.textContent = formatTime(state.sessionRemaining);

            // Check if time is up — begin wind-down
            if (state.sessionRemaining <= 0 && !state.sessionComplete) {
                state.sessionComplete = true;
            }

            state.animationFrameId = requestAnimationFrame(mainLoop);
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m > 0 ? `${m}m ${s}s` : `${s}s`;
        }

        function ensureAudioContext() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    console.error("Web Audio API is not supported.");
                    return false;
                }
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            return true;
        }

        function startBreathing() {
            if (!ensureAudioContext()) {
                UI.breathToggle.disabled = true;
                return;
            }

            if (isSpeechSupported && !speechInitialized) {
                speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                speechInitialized = true;
            }

            if (state.paused) {
                state.paused = false;
                state.phaseStartTime = performance.now() - state.accumulatedPauseTime;
                // Restart ambient sound if enabled but not active
                if (ambientActive && !ambientNodes['fireplace']) {
                    toggleAmbient('fireplace', true);
                }
                announce("Resumed.");
            } else {
                if (state.running) return;
                state.sessionRemaining = state.sessionDuration;
                state.sessionComplete = false;
                state.phaseIndex = -1;
                advancePhase();
            }

            state.running = true;
            state.lastFrameTime = performance.now();
            UI.shapeContainer.classList.add('active');
            state.animationFrameId = requestAnimationFrame(mainLoop);
            updateUIForState();
        }

        function pauseBreathing() {
            if (!state.running || state.paused) return;
            state.paused = true;
            state.accumulatedPauseTime = performance.now() - state.phaseStartTime;
            cancelAnimationFrame(state.animationFrameId);

            // Suspend AudioContext to freeze all audio in place
            if (audioContext && audioContext.state === 'running') {
                audioContext.suspend();
            }

            updateUIForState();
            announce("Paused.");
        }

        function resetToReady() {
            state.running = false;
            state.paused = false;
            state.sessionComplete = false;
            state.flashActive = false;
            state.sessionRemaining = 0;
            cancelAnimationFrame(state.animationFrameId);
            state.animationFrameId = null;

            state.cycleCount = 0;

            if (audioContext) {
                stopBreathSound();
            }
            // Ambient keeps playing — do NOT reset it

            UI.shapeContainer.classList.remove('active');

            // Remove any session flash element
            const flash = document.querySelector('.session-flash');
            if (flash) flash.remove();

            resetUI();
            updateUIForState();
            announce("Ready.");
        }

        function setMode(newMode) {
            if (newMode === state.mode) return;
            if (state.running) resetToReady();

            state.mode = newMode;

            UI.boxSVG.classList.toggle('hidden', state.mode !== 'box');
            UI.triangleSVG.classList.toggle('hidden', state.mode === 'box');

            updateUIForState();
            resetUI();
        }

        function advancePhase() {
            state.phaseIndex++;
            if (state.phaseIndex >= PHASES[state.mode].length) {
                state.phaseIndex = 0;
                incrementCycle();

                // Wind-down: if session timer expired, show summary instead of continuing
                if (state.sessionComplete) {
                    showSessionSummary();
                    return;
                }
            }

            const newPhase = PHASES[state.mode][state.phaseIndex];
            state.phaseStartTime = performance.now();
            state.accumulatedPauseTime = 0;

            UI.phaseLabel.textContent = newPhase.name;
            announce(`${newPhase.name} for ${newPhase.duration} seconds.`);

            // Update colors based on phase
            const { color, glow } = PHASE_COLORS[newPhase.name];
            const progressEl = state.mode === 'box' ? UI.boxProgress : UI.triangleProgress;
            progressEl.style.stroke = color;
            UI.phaseLabel.style.color = color;
            UI.countdownTimer.style.textShadow = `0 0 30px ${glow}`;

            if (state.preferences.voice) {
                speak(newPhase.name);
            }

            if (state.preferences.breath && (newPhase.name === 'Inhale' || newPhase.name === 'Exhale')) {
                playBreathSound(newPhase.duration);
            }
        }

        function incrementCycle() {
            state.cycleCount++;
        }

        // =================================================================
        // UI & VISUALS
        // =================================================================

        function updateUI(elapsed) {
            const currentPhase = PHASES[state.mode][state.phaseIndex];
            const progress = Math.min(elapsed / currentPhase.duration, 1.0);

            UI.countdownTimer.textContent = Math.ceil(currentPhase.duration - elapsed);

            updateShapeProgress(isReducedMotion ? 1 : progress);
        }

        function updateShapeProgress(progress) {
            const totalLength = pathLengths[state.mode];
            const phaseCount = PHASES[state.mode].length;
            const segmentLength = totalLength / phaseCount;

            const startOffset = totalLength - (state.phaseIndex * segmentLength);
            const currentOffset = startOffset - (progress * segmentLength);

            const progressEl = state.mode === 'box' ? UI.boxProgress : UI.triangleProgress;
            progressEl.style.strokeDashoffset = `${currentOffset}`;
        }

        function resetUI() {
            UI.phaseLabel.textContent = 'Ready';
            UI.phaseLabel.style.color = '';
            UI.countdownTimer.textContent = '';
            UI.countdownTimer.style.textShadow = '';
            UI.remainingTime.textContent = '';
            UI.durationSelector.classList.remove('hidden');

            const progressEl = state.mode === 'box' ? UI.boxProgress : UI.triangleProgress;
            const totalLength = pathLengths[state.mode];
            progressEl.style.strokeDasharray = `${totalLength}`;
            progressEl.style.strokeDashoffset = `${totalLength}`;
            progressEl.style.stroke = '';
        }

        function updateActionButton() {
            if (!state.running || state.paused) {
                UI.actionBtn.textContent = state.paused ? 'Resume' : 'Start';
                UI.actionBtn.className = 'btn action-start';
                UI.actionBtn.setAttribute('aria-label', state.paused ? 'Resume breathing' : 'Start breathing');
            } else {
                UI.actionBtn.textContent = 'Pause';
                UI.actionBtn.className = 'btn action-pause';
                UI.actionBtn.setAttribute('aria-label', 'Pause breathing');
            }
        }

        function updateUIForState() {
            updateActionButton();

            // Duration selector: visible when not running, hidden during session
            UI.durationSelector.classList.toggle('hidden', state.running);

            UI.modeBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === state.mode);
            });

            // Update duration pill selection
            document.querySelectorAll('.duration-btn').forEach(btn => {
                btn.classList.toggle('selected', parseInt(btn.dataset.minutes) === state.sessionDuration / 60);
            });

            updateToggleState(UI.voiceToggle, state.preferences.voice);
            updateToggleState(UI.breathToggle, state.preferences.breath);

            // Restore ambient toggle state
            ambientActive = state.preferences.ambient === 'fireplace';
            updateToggleState(UI.ambientToggle, ambientActive);
        }

        function updateToggleState(button, isActive) {
            button.setAttribute('aria-pressed', isActive);
        }

        // =================================================================
        // AUDIO — Synthetic
        // =================================================================

        function primeSpeechSynthesis() {
            if (!isSpeechSupported) return;
            speechSynthesis.onvoiceschanged = () => {
                voices = speechSynthesis.getVoices();
            };
            voices = speechSynthesis.getVoices();
        }

        function speak(text) {
            if (!isSpeechSupported || !state.preferences.voice) return;

            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.8;
            utterance.pitch = 0.8;

            if (voices.length > 0) {
                const selectedVoice = voices.find(v => v.name === 'Samantha') ||
                                      voices.find(v => v.name === 'Google US English') ||
                                      voices.find(v => v.lang === 'en-US');
                if (selectedVoice) utterance.voice = selectedVoice;
            }

            speechSynthesis.speak(utterance);
        }

        function playBreathSound(duration) {
            if (!audioContext || !state.preferences.breath) return;

            try { if (breathNodes.source) breathNodes.source.stop(); } catch {}

            const source = audioContext.createBufferSource();
            source.buffer = getNoiseBuffer(duration);
            source.loop = true;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 800;

            const gain = audioContext.createGain();
            gain.gain.setValueAtTime(0, audioContext.currentTime);
            gain.gain.linearRampToValueAtTime(0.1, audioContext.currentTime + 0.15);
            gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + duration - 0.25);

            source.connect(filter).connect(gain).connect(audioContext.destination);
            source.start();
            source.stop(audioContext.currentTime + duration);

            breathNodes = { source, filter, gain };
        }

        // =================================================================
        // AUDIO — Ambient
        // =================================================================

        let ambientActive = false;

        function stopBreathSound() {
            try { if (breathNodes.source) breathNodes.source.stop(); } catch {}
            if (breathNodes.gain) breathNodes.gain.gain.cancelScheduledValues(audioContext.currentTime);
        }

        // Reusable noise buffer (generate once, share across ambient sounds)
        let sharedNoiseBuffer = null;
        function getNoiseBuffer(seconds = 4) {
            if (sharedNoiseBuffer && sharedNoiseBuffer.duration >= seconds) return sharedNoiseBuffer;
            const bufferSize = audioContext.sampleRate * seconds;
            const buffer = audioContext.createBuffer(2, bufferSize, audioContext.sampleRate);
            for (let ch = 0; ch < 2; ch++) {
                const data = buffer.getChannelData(ch);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
            }
            sharedNoiseBuffer = buffer;
            return buffer;
        }

        function makeNoiseSource(seconds) {
            const s = audioContext.createBufferSource();
            s.buffer = getNoiseBuffer(seconds);
            s.loop = true;
            return s;
        }

        function toggleAmbient(type, enabled) {
            if (enabled && !ensureAudioContext()) return;
            if (!audioContext) return;

            if (enabled) {
                if (ambientNodes[type]) return;

                const sources = [];
                const oscillators = [];
                let timeoutId = null;
                const spawnedSources = [];

                // Master gain for this ambient type
                const master = audioContext.createGain();
                master.gain.setValueAtTime(0, audioContext.currentTime);
                master.gain.linearRampToValueAtTime(0.07, audioContext.currentTime + 2.0);

                // Fireplace ambient — the only ambient sound
                // Layer 1: Brownian noise rumble (deep warm base)
                const rumble = makeNoiseSource(4);
                const rumbleFilter = audioContext.createBiquadFilter();
                rumbleFilter.type = 'lowpass';
                rumbleFilter.frequency.value = 150;
                rumbleFilter.Q.value = 0.7;
                const rumbleGain = audioContext.createGain();
                rumbleGain.gain.value = 0.8;
                rumble.connect(rumbleFilter).connect(rumbleGain).connect(master);
                rumble.start();
                sources.push(rumble);

                // Layer 2: tight mid body (narrower bandpass for warmth)
                const midNoise = makeNoiseSource(4);
                const midFilter = audioContext.createBiquadFilter();
                midFilter.type = 'bandpass';
                midFilter.frequency.value = 500;
                midFilter.Q.value = 2.0;
                const midGain = audioContext.createGain();
                midGain.gain.value = 0.2;
                midNoise.connect(midFilter).connect(midGain).connect(master);
                midNoise.start();
                sources.push(midNoise);

                // Layer 3: random crackle/pop events
                const crackle = () => {
                    const entry = ambientNodes[type];
                    if (!entry) return;
                    const burstLen = 0.02 + Math.random() * 0.02;
                    const burstBuf = audioContext.createBuffer(1, audioContext.sampleRate * burstLen, audioContext.sampleRate);
                    const bd = burstBuf.getChannelData(0);
                    for (let i = 0; i < bd.length; i++) bd[i] = Math.random() * 2 - 1;
                    const burst = audioContext.createBufferSource();
                    burst.buffer = burstBuf;
                    const burstFilter = audioContext.createBiquadFilter();
                    burstFilter.type = 'highpass';
                    burstFilter.frequency.value = 1000 + Math.random() * 2000;
                    const burstGain = audioContext.createGain();
                    const vol = 0.10 + Math.random() * 0.18;
                    burstGain.gain.setValueAtTime(vol, audioContext.currentTime);
                    burstGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + burstLen);
                    burst.connect(burstFilter).connect(burstGain).connect(master);
                    burst.start();
                    burst.onended = () => { burst.disconnect(); burstFilter.disconnect(); burstGain.disconnect(); };

                    if (Math.random() < 0.5) {
                        const popLen = 0.01 + Math.random() * 0.015;
                        const popBuf = audioContext.createBuffer(1, audioContext.sampleRate * popLen, audioContext.sampleRate);
                        const pd = popBuf.getChannelData(0);
                        for (let i = 0; i < pd.length; i++) pd[i] = Math.random() * 2 - 1;
                        const pop = audioContext.createBufferSource();
                        pop.buffer = popBuf;
                        const popFilter = audioContext.createBiquadFilter();
                        popFilter.type = 'bandpass';
                        popFilter.frequency.value = 3000 + Math.random() * 2000;
                        popFilter.Q.value = 1.5;
                        const popGain = audioContext.createGain();
                        popGain.gain.setValueAtTime(0.06 + Math.random() * 0.08, audioContext.currentTime);
                        popGain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + popLen);
                        pop.connect(popFilter).connect(popGain).connect(master);
                        pop.start();
                        pop.onended = () => { pop.disconnect(); popFilter.disconnect(); popGain.disconnect(); };
                    }

                    const nextDelay = Math.random() < 0.4
                        ? 80 + Math.random() * 200
                        : 1200 + Math.random() * 3000;
                    entry.timeoutId = setTimeout(crackle, nextDelay);
                };
                timeoutId = setTimeout(crackle, 600 + Math.random() * 1000);

                master.connect(audioContext.destination);

                ambientNodes[type] = { sources, oscillators, gain: master, spawnedSources, timeoutId };

            } else {
                const nodes = ambientNodes[type];
                if (!nodes) return;

                // Clear any pending timeout
                if (nodes.timeoutId) clearTimeout(nodes.timeoutId);

                nodes.gain.gain.cancelScheduledValues(audioContext.currentTime);
                nodes.gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 1.0);

                // Stop all spawned sources
                for (const s of nodes.spawnedSources) {
                    try { s.stop(); } catch {}
                }

                setTimeout(() => {
                    for (const s of (nodes.sources || [])) {
                        try { s.stop(); } catch {}
                    }
                    for (const o of (nodes.oscillators || [])) {
                        try { o.stop(); } catch {}
                    }
                    nodes.gain.disconnect();
                }, 1100);

                delete ambientNodes[type];
            }
        }

        // =================================================================
        // DURATION & SESSION
        // =================================================================

        function selectDuration(minutes) {
            state.sessionDuration = minutes * 60;
            document.querySelectorAll('.duration-btn').forEach(btn => {
                btn.classList.toggle('selected', parseInt(btn.dataset.minutes) === minutes);
            });
            savePreferences();
        }

        function showSessionSummary() {
            // Stop the animation loop but keep ambient playing
            state.running = false;
            state.flashActive = true;
            cancelAnimationFrame(state.animationFrameId);
            state.animationFrameId = null;
            UI.shapeContainer.classList.remove('active');

            // Stop breath sound only — ambient keeps playing
            if (audioContext) {
                stopBreathSound();
            }

            // Calculate stats
            const cycles = state.cycleCount;

            // Update the display area
            UI.phaseLabel.textContent = '';
            UI.countdownTimer.textContent = '';
            UI.countdownTimer.style.textShadow = '';
            UI.remainingTime.textContent = '';

            // Create flash element
            const flash = document.createElement('div');
            flash.className = 'session-flash';
            const flashText = document.createElement('div');
            flashText.className = 'flash-text';
            flashText.textContent = `Session Complete \u00B7 ${cycles} cycle${cycles !== 1 ? 's' : ''}`;
            flash.appendChild(flashText);

            const displayText = document.querySelector('.display-text');
            displayText.appendChild(flash);

            // Voice announce if enabled
            if (state.preferences.voice) {
                speak('Session Complete');
            }
            announce('Session Complete');

            // Auto-reset after 3 seconds
            setTimeout(() => {
                flash.style.animation = 'flashFadeOut 0.5s ease-out forwards';
                setTimeout(() => {
                    resetToReady();
                }, 500);
            }, 3000);
        }

        // =================================================================
        // UTILITIES & PERSISTENCE
        // =================================================================

        function announce(message) {
            UI.announcer.textContent = message;
        }

        function togglePreference(key) {
            state.preferences[key] = !state.preferences[key];
            const toggleEl = UI[`${key}Toggle`];
            if (toggleEl) updateToggleState(toggleEl, state.preferences[key]);
            savePreferences();

            if (key === 'breath' && state.preferences.breath) {
                ensureAudioContext();
            }
        }

        function savePreferences() {
            try {
                const data = {
                    ...state.preferences,
                    sessionDuration: state.sessionDuration
                };
                localStorage.setItem(PREF_KEY, JSON.stringify(data));
            } catch {}
        }

        function loadPreferences() {
            try {
                const savedPrefs = localStorage.getItem(PREF_KEY);
                if (savedPrefs) {
                    const parsed = JSON.parse(savedPrefs);
                    if (parsed.sessionDuration) {
                        state.sessionDuration = parsed.sessionDuration;
                    }
                    // Migrate old ambient format (object → string|null)
                    if (parsed.ambient && typeof parsed.ambient === 'object') {
                        parsed.ambient = null;
                    }
                    // Migrate removed ambient types to null
                    if (parsed.ambient === 'waterfall' || parsed.ambient === 'nature') {
                        parsed.ambient = null;
                    }
                    // Strip removed preference keys
                    delete parsed.haptic;
                    delete parsed.sessionDuration;

                    state.preferences = {
                        ...state.preferences,
                        ...parsed
                    };

                    // Save cleaned preferences
                    savePreferences();
                }
            } catch {}
        }

        // --- Initialize ---
        init();
    </script>
</body>
</html>
